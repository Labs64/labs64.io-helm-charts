{{- if .Values.externalSecrets.enabled }}
{{ include "chart-libs.externalsecret" . }}
{{- else }}
{{- if or .Values.secrets.data .Values.rabbitmq.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chart-libs.fullname" . }}
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
  annotations:
    # pre-install hook so pre-install migration/bootstrap Jobs can reference this Secret
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
{{- range $key, $value := .Values.secrets.data }}
  {{ $key }}: {{ $value | quote }}
{{- end }}
{{- if .Values.rabbitmq.enabled }}
{{- if not (hasKey .Values.secrets.data "SPRING_RABBITMQ_USERNAME") }}
  SPRING_RABBITMQ_USERNAME: {{ .Values.rabbitmq.auth.username | quote }}
{{- end }}
{{- if not (hasKey .Values.secrets.data "SPRING_RABBITMQ_PASSWORD") }}
  SPRING_RABBITMQ_PASSWORD: {{ .Values.rabbitmq.auth.password | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
