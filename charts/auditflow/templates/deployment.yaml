apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-libs.fullname" . }}
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart-libs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-app-ext.yaml") . | sha256sum }}
      {{- if .Values.observability.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.port | quote }}
        prometheus.io/path: /actuator/prometheus
      {{- end }}
      {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "chart-libs.labels" . | nindent 8 }}
          {{- with .Values.podLabels }}
          {{- toYaml . | nindent 8 }}
          {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chart-libs.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 45 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        # Main Application Container (auditflow)
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- include "chart-libs.preStopDrain" . | nindent 10 }}
          {{- include "chart-libs.startupProbe" . | nindent 10 }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:file:/opt/application-config/application.yaml"
          {{- include "chart-libs.gracefulShutdown.springEnv" . | nindent 12 }}
          {{- if .Values.observability.enabled }}
            # Activates the OTel Java Agent bundled in the image (do not also set
            # JAVA_TOOL_OPTIONS via .Values.env when observability is enabled).
            - name: JAVA_TOOL_OPTIONS
              value: "-javaagent:/otel/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: {{ include "chart-libs.fullname" . }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            # Java metrics flow via the Prometheus pod-annotation scrape (Micrometer names)
            - name: OTEL_METRICS_EXPORTER
              value: "none"
          {{- end }}
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "chart-libs.fullname" . }}
            - secretRef:
                name: {{ include "chart-libs.fullname" . }}
          volumeMounts:
            - name: config-additional-location
              mountPath: /opt/application-config
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if eq .Values.applicationYaml.transformer.discovery.mode "local" }}
        # AuditFlow Transformer Sidecar Container
        - name: auditflow-transformer
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.transformer.image.repository }}:{{ .Values.transformer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.transformer.image.pullPolicy }}
          ports:
            - name: http-trn
              containerPort: {{ .Values.transformer.service.port }}
              protocol: TCP
          {{- with .Values.transformer.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: APP_NAME
              value: "auditflow-transformer"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- if $.Values.observability.enabled }}
            - name: OTEL_SERVICE_NAME
              value: "auditflow-transformer"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.observability.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: "true"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
          {{- end }}
          livenessProbe:
            httpGet:
              path: /live
              port: http-trn
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: http-trn
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
        {{- end }}
        {{- if eq .Values.applicationYaml.sink.discovery.mode "local" }}
        # AuditFlow Sink Sidecar Container
        - name: auditflow-sink
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.sink.image.repository }}:{{ .Values.sink.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sink.image.pullPolicy }}
          ports:
            - name: http-snk
              containerPort: {{ .Values.sink.service.port }}
              protocol: TCP
          {{- with .Values.sink.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: APP_NAME
              value: "auditflow-sink"
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- if $.Values.observability.enabled }}
            - name: OTEL_SERVICE_NAME
              value: "auditflow-sink"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.observability.otlpEndpoint | quote }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_PYTHON_LOG_CORRELATION
              value: "true"
            - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
              value: "true"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "otlp"
          {{- end }}
          livenessProbe:
            httpGet:
              path: /live
              port: http-snk
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: http-snk
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 2
        {{- end }}
      volumes:
        - name: config-additional-location
          configMap:
            name: {{ include "chart-libs.fullname" . }}-app-ext
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
