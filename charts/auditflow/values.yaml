# -- Global values shared across Labs64.IO charts and Bitnami subcharts
# @schema
# type: object
# additionalProperties: true
# @schema
global:
  security:
    # -- Required by Bitnami subcharts when images are pulled from bitnamilegacy (image substitution guard)
    allowInsecureImages: true

# -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: labs64/auditflow
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

transformer:
  image:
    repository: labs64/auditflow-transformer
    pullPolicy: IfNotPresent
    tag: ""
  # -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 8081
  # -- Resource requests/limits for the transformer sidecar (lightweight Python/FastAPI service).
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

sink:
  image:
    repository: labs64/auditflow-sink
    pullPolicy: IfNotPresent
    tag: ""
  # -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 8082
  # -- Resource requests/limits for the sink sidecar (lightweight Python/FastAPI service).
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 128Mi

# -- This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration (create RBAC resources: Role, RoleBinding)
# Least-privilege, namespace-scoped: the tenant-config informer (tenants.source.mode=
# gitops-configmap) needs ConfigMap get/list/watch; the secretRef resolver
# (secretRef.resolver=k8s-secret) needs Secret get; kubernetes service discovery
# (transformer/sink) needs Service get.
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["configmaps"]
      verbs: ["get", "list", "watch"]
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get"]
    - apiGroups: [""]
      resources: ["services"]
      verbs: ["get"]

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1064
  runAsGroup: 1064
  fsGroup: 1064
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1064

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Resource limits and requests for the container
# For production, it's recommended to set both requests and limits
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

# -- This is to setup the liveness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 2

# -- This is to setup the readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2

# -- Startup probe (rendered by chart-libs.startupProbe): guards slow cold starts
# (Spring Boot + OTel Java Agent) so the liveness probe never kills a still-booting
# pod. Max boot budget = failureThreshold * periodSeconds.
startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  failureThreshold: 30
  periodSeconds: 5
  timeoutSeconds: 2

# -- Graceful shutdown: drain in-flight requests / message handlers on rolling
# updates and scale-in. Keep terminationGracePeriodSeconds > preStop + gracefulShutdown.timeout.
terminationGracePeriodSeconds: 45
gracefulShutdown:
  # -- Max time Spring Boot waits for in-flight work before forced shutdown
  timeout: 30s
lifecycle:
  # -- preStop sleep (seconds) so Traefik/kube-proxy deregister the pod before shutdown; 0 disables
  preStopDrainSeconds: 5

# -- This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true


# -- Node labels for pod assignment
# For more information: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
nodeSelector: {}
#  kubernetes.io/arch: amd64
#  disktype: ssd

# -- Tolerations for pod assignment
# For more information: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
tolerations: []
#  - key: "key1"
#    operator: "Equal"
#    value: "value1"
#    effect: "NoSchedule"

# -- Affinity for pod assignment
# For more information: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
affinity: {}
#  podAntiAffinity:
#    preferredDuringSchedulingIgnoredDuringExecution:
#      - weight: 100
#        podAffinityTerm:
#          labelSelector:
#            matchExpressions:
#              - key: app.kubernetes.io/name
#                operator: In
#                values:
#                  - auditflow
#          topologyKey: kubernetes.io/hostname

# -- Environment variables to add to the container
env: []
#  - name: JAVA_OPTS
#    value: "-Xmx512m -Xms256m"
#  - name: SPRING_PROFILES_ACTIVE
#    value: "production"

# -- Secret data to be used as environment variables (delivered via envFrom).
# External installs supply broker credentials here, e.g.
#   SPRING_RABBITMQ_USERNAME / SPRING_RABBITMQ_PASSWORD.
# When rabbitmq.enabled=true the chart adds these keys automatically from rabbitmq.auth.
# Keys you set here take precedence over the bundled-dep keys. On helm upgrade the Secret is deleted and recreated (hook-managed).
# Note: the Secret is hook-managed (pre-install) and survives helm uninstall.
# @schema
# type: object
# properties:
#   data:
#     type: object
#     additionalProperties: true
# @schema
secrets:
  data: {}

# -- Observability is an infrastructure concern: the same images run with or without it.
# When enabled, the backend's bundled OTel Java Agent is activated via JAVA_TOOL_OPTIONS and
# the Python sidecars start under opentelemetry-instrument (triggered by the OTLP endpoint env).
# Java metrics stay on Micrometer via /actuator/prometheus (prometheus.io/* pod annotations
# are added automatically when enabled).
observability:
  # -- Enable runtime instrumentation (traces + logs OTLP, Prometheus-annotation metrics scrape)
  enabled: false
  # -- OTLP endpoint of the OpenTelemetry Collector
  otlpEndpoint: "http://$(NODE_IP):4318"

# -- Optional bundled RabbitMQ (Bitnami subchart) for standalone/local installs.
# Dev-grade credentials - NOT for production; point applicationYaml at your own broker instead.
# @schema
# type: object
# additionalProperties: true
# @schema
rabbitmq:
  enabled: false
  # -- docker.io/bitnami versioned tags were moved to bitnamilegacy; keep in sync with the subchart's default tag
  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  image:
    repository: bitnamilegacy/rabbitmq
  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  auth:
    username: labs64
    password: labs64pw

# -- Tenant provisioning shipped by the chart (rendered as `auditflow.io/tenant`-labelled
# ConfigMaps consumed live by the gitops-configmap source — see templates/tenant-configmaps.yaml).
tenants:
  # -- The reserved `_platform` pseudo-tenant for tenantless/platform events. Shipped by
  # default so platform events flow out of the box; K8s object name/label use the sanitized
  # `platform`, the body keeps the canonical `_platform`.
  platform:
    # -- Per-tenant ingest rate limit (token bucket): sustained events/second
    rateLimitPerSec: 200
    # -- Per-tenant ingest rate limit: burst capacity
    burst: 400
    # -- The platform tenant's pipelines (same shape as the former global auditflow.pipelines)
    # @schema
    # type: array
    # items:
    #   type: object
    #   additionalProperties: true
    # @schema
    pipelines:
      - name: platform-logging
        enabled: true
        sink:
          name: logging_sink
          properties:
            log-level: INFO
  # -- Additional tenants to provision with the release: a list of full tenant documents
  # ({tenantId, enabled, quota, pipelines}); each renders as its own labelled ConfigMap.
  # Tenants can also be onboarded at any time by applying such a ConfigMap out-of-band (GitOps).
  # @schema
  # type: array
  # items:
  #   type: object
  #   additionalProperties: true
  # @schema
  additional: []

# -- Additional application properties
applicationYaml:
  # -- Transformer configuration
  transformer:
    # -- Discovery mode; "local" or "kubernetes"
    discovery:
      mode: local
    # -- Local URL for the transformer service
    local:
      url: "http://localhost:8081"
    # -- Service name and namespace for the transformer
    service:
      name: auditflow-transformer
      namespace: default
  # -- Sink configuration
  sink:
    # -- Discovery mode; "local" or "kubernetes"
    discovery:
      mode: local
    # -- Local URL for the sink service
    local:
      url: "http://localhost:8082"
    # -- Service name and namespace for the sink
    service:
      name: auditflow-sink
      namespace: default

  # -- AuditFlow application properties (bound by @ConfigurationProperties(prefix = "auditflow"))
  auditflow:
    # -- Legacy global pipelines — MUST stay empty: pipelines are per-tenant now (see
    # `tenants.platform.pipelines` below and the tenant ConfigMaps), and a non-empty
    # list fails application startup by design.
    pipelines: []

  # -- Tenant model (silo isolation) — the chart pins the Kubernetes-native modes; the
  # application's built-in defaults are the cluster-free ones (local-dir / in-memory / env).
  # Keys below are exact Spring property paths (@Value binding, no relaxed naming) — keep kebab-case.
  tenants:
    source:
      # -- Tenant config source; "gitops-configmap" watches ConfigMaps labelled `auditflow.io/tenant`
      # in the release namespace (requires rbac.create), "local-dir" polls a mounted directory
      mode: gitops-configmap
    ratelimit:
      # -- Per-tenant ingest rate-limit backend; "redis" is correct with >1 replica (the
      # application default "in-memory" is single-replica only)
      backend: redis
    consumer:
      # -- Max concurrently-processed events per tenant on the consumer side (fairness layer 2)
      max-in-flight-per-tenant: 4

  # -- Resolver for `${secretRef:<key>}` sink-credential indirection; "k8s-secret" reads the
  # tenant's own Secret `auditflow-tenant-<tenantId>-creds` (requires rbac.create), "env" reads
  # `AUDITFLOW_TENANT_<TENANTID>_<KEY>` environment variables
  secretRef:
    resolver: k8s-secret

  # -- Spring configuration
  spring:
    # -- RabbitMQ connection params
    rabbitmq:
      # -- RabbitMQ host; resolves to the bundled subchart service when rabbitmq.enabled, else set your broker host
      host: '{{ ternary (printf "%s-rabbitmq" .Release.Name) "rabbitmq.tools.svc.cluster.local" .Values.rabbitmq.enabled }}'
      # -- RabbitMQ port; default: 5672
      port: 5672
    # -- Redis connection params (backing store for the idempotency/dedup service; auditflow.idempotency.store=redis)
    data:
      redis:
        # -- Redis host; defaults to the shared tools Redis. Override for your own Redis in non-local installs.
        host: redis-master.tools.svc.cluster.local
        # -- Redis port; default: 6379
        port: 6379

# -- Gateway routes published by this module (rendered by chart-libs.gateway-routes)
gateway:
  # -- Publish this module's routes on the Traefik gateway
  enabled: false
  # -- External path prefix; defaults to /<chart-name>
  prefix: ""
  # -- Gateway API parent Gateway(s) this module's HTTPRoute attaches to
  parentRefs:
    - name: labs64io-gateway
      namespace: tools
  # -- Names of the shared middlewares provided by the gateway-common chart
  sharedMiddlewares:
    auth: gateway-common-auth
    rateLimit: gateway-common-ratelimit
    compress: gateway-common-compress
    buffering: gateway-common-buffering
  # -- Auth-policy publication. NOTE: the traefik-authproxy no longer
  # live-discovers per-module policies via /.well-known/auth-policy — it loads a
  # generated routes manifest (charts/traefik-authproxy/routes/) and asks the
  # central Cerbos PDP for every decision. This block is retained for backward
  # compatibility and is a no-op for edge enforcement.
  authPolicy:
    # -- Publish this module's auth policy to the gateway ACS
    enabled: true
    # -- External base path prepended to the module's OpenAPI paths; defaults to <prefix>/api/v1
    basePath: ""
  # -- Routes exposed by this module
  routes:
    # -- AuditFlow API (protected; strips '<prefix>/api/v1' — backend is root-mapped)
    - path: /api/v1
      port: 8080
      stripPath: true
    # -- OpenAPI docs (public, prefix stripped before forwarding)
    - path: /v3/api-docs
      port: 8080
      public: true
      stripPrefix: true
# -- PodDisruptionBudget (rendered by chart-libs.pdb)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- NetworkPolicy: allow ingress from Traefik and same-namespace pods only (rendered by chart-libs.networkpolicy)
networkPolicy:
  enabled: false
  # -- Namespace where Traefik runs
  gatewayNamespace: tools
  # -- Additional raw ingress rules
  extraIngress: []
  # -- Egress rules enforcing database-per-service isolation.
  egress:
    # Cerbos PDP: @Authorize decisions over gRPC.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: cerbos
      ports:
        - protocol: TCP
          port: 3593
    # RabbitMQ
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tools
          podSelector:
            matchLabels:
              app.kubernetes.io/name: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    # Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tools
          podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: 6379
    # Kubernetes API server — required by the tenant-config ConfigMap watch
    # (tenants.source.mode=gitops-configmap), the k8s-secret resolver, and kubernetes
    # service discovery. The API server sits outside any namespace so it is only
    # addressable via ipBlock; scoped to the HTTPS/API ports.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443

# -- SLO recording rules and dashboards (rendered by chart-libs.slo.*)
slo:
  enabled: true
  availability:
    targetRatio: 0.999
  latency:
    targetRatio: 0.99
    thresholdSeconds: 0.5

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}

# -- helm test hook (rendered by chart-libs.test-connection)
tests:
  enabled: true
  # -- Health endpoint probed by `helm test`
  healthPath: /actuator/health
