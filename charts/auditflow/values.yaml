# -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: labs64/auditflow
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

transformer:
  image:
    repository: labs64/auditflow-transformer
    pullPolicy: IfNotPresent
    tag: ""
  # -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 8081

sink:
  image:
    repository: labs64/auditflow-sink
    pullPolicy: IfNotPresent
    tag: ""
  # -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
    port: 8082

# -- This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration (create RBAC resources: Role, RoleBinding)
rbac:
  create: false
  rules: []
    #- apiGroups: [""]
    #  resources: ["pods"]
    #  verbs: ["get", "list", "watch"]

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1064
  runAsGroup: 1064
  fsGroup: 1064
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  # runAsNonRoot: true
  # runAsUser: 1064

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- IngressRoute configuration for Traefik more information can be found here: https://doc.traefik.io/traefik/routing/providers/kubernetes-crd/
ingressroute:
  # -- This sets whether the IngressRoute is enabled or not
  enabled: false
  # -- Host for the IngressRoute
  host: localhost
  # -- Entry points for the IngressRoute
  entryPoints:
    - web
    - websecure

# -- Resource limits and requests for the container
# For production, it's recommended to set both requests and limits
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

# -- This is to setup the liveness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 2

# -- This is to setup the readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2

# -- This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true


# -- Node labels for pod assignment
# For more information: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
nodeSelector: {}
#  kubernetes.io/arch: amd64
#  disktype: ssd

# -- Tolerations for pod assignment
# For more information: https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
tolerations: []
#  - key: "key1"
#    operator: "Equal"
#    value: "value1"
#    effect: "NoSchedule"

# -- Affinity for pod assignment
# For more information: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
affinity: {}
#  podAntiAffinity:
#    preferredDuringSchedulingIgnoredDuringExecution:
#      - weight: 100
#        podAffinityTerm:
#          labelSelector:
#            matchExpressions:
#              - key: app.kubernetes.io/name
#                operator: In
#                values:
#                  - auditflow
#          topologyKey: kubernetes.io/hostname

# -- Environment variables to add to the container
env: []
#  - name: JAVA_OPTS
#    value: "-Xmx512m -Xms256m"
#  - name: SPRING_PROFILES_ACTIVE
#    value: "production"

# -- Secret data to be used as environment variables
secrets:
  data: {}

# -- Optional bundled RabbitMQ (Bitnami subchart) for standalone/local installs.
# Dev-grade credentials - NOT for production; point applicationYaml at your own broker instead.
# @schema
# type: object
# additionalProperties: true
# @schema
rabbitmq:
  enabled: false
  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  auth:
    username: labs64
    password: labs64-local

# -- Additional application properties
applicationYaml:
  # -- Transformer configuration
  transformer:
    # -- Discovery mode; "local" or "kubernetes"
    discovery:
      mode: local
    # -- Local URL for the transformer service
    local:
      url: "http://localhost:8081"
    # -- Service name and namespace for the transformer
    service:
      name: auditflow-transformer
      namespace: default
  # -- Sink configuration
  sink:
    # -- Discovery mode; "local" or "kubernetes"
    discovery:
      mode: local
    # -- Local URL for the sink service
    local:
      url: "http://localhost:8082"
    # -- Service name and namespace for the sink
    service:
      name: auditflow-sink
      namespace: default

  # -- AuditFlow pipelines configuration
  pipelines: []
  #  - name: 'logs'
  #    enabled: true
  #    transformer:
  #      name: 'zero'
  #    sink:
  #      name: 'logging_sink'
  #      properties:
  #        log-level: "DEBUG"
  #        format: "json"

  # -- Spring configuration
  spring:
    # -- RabbitMQ connection params
    rabbitmq:
      # -- RabbitMQ host; resolves to the bundled subchart service when rabbitmq.enabled, else set your broker host
      host: '{{ ternary (printf "%s-rabbitmq" .Release.Name) "rabbitmq.tools.svc.cluster.local" .Values.rabbitmq.enabled }}'
      # -- RabbitMQ port; default: 5672
      port: 5672
      # -- RabbitMQ username
      username: '{{ ternary .Values.rabbitmq.auth.username "<TODO>" .Values.rabbitmq.enabled }}'
      # -- RabbitMQ password
      password: '{{ ternary .Values.rabbitmq.auth.password "<TODO>" .Values.rabbitmq.enabled }}'

# -- Gateway routes published by this module (rendered by chart-libs.gateway-routes)
gateway:
  # -- Publish this module's routes on the Traefik gateway
  enabled: false
  # -- External path prefix; defaults to /<chart-name>
  prefix: ""
  # -- Traefik entry points
  entryPoints:
    - web
    - websecure
  # -- Names of the shared middlewares provided by the gateway-common chart
  sharedMiddlewares:
    auth: gateway-common-auth
    rateLimit: gateway-common-ratelimit
    securityHeaders: gateway-common-security-headers
  # -- Routes exposed by this module
  routes:
    # -- AuditFlow API (protected)
    - path: /api
      port: 8080
      roles:
        - admin-role
        - auditflow-role
        - default-roles-labs64io
    # -- OpenAPI docs (public, prefix stripped before forwarding)
    - path: /v3/api-docs
      port: 8080
      public: true
      stripPrefix: true
# -- PodDisruptionBudget (rendered by chart-libs.pdb)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- NetworkPolicy: allow ingress from Traefik and same-namespace pods only (rendered by chart-libs.networkpolicy)
networkPolicy:
  enabled: false
  # -- Namespace where Traefik runs
  gatewayNamespace: tools
  # -- Additional raw ingress rules
  extraIngress: []

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}

# -- helm test hook (rendered by chart-libs.test-connection)
tests:
  enabled: true
  # -- Health endpoint probed by `helm test`
  healthPath: /actuator/health
