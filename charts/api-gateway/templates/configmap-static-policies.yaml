apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-libs.fullname" . }}-static-policies
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
data:
  static_routes.yaml: |-
    # GENERATED from .Values.staticPolicies — routing only; Cerbos static_api decides.
    static:
    {{- range .Values.staticPolicies }}
      - id: {{ .id }}
        prefix: {{ .prefix }}
        public: {{ .public | default false }}
        scopes: [{{ range $i, $s := (.scopes | default list) }}{{ if $i }}, {{ end }}{{ $s }}{{ end }}]
    {{- end }}
