enabled: true

ui:
  enabled: true
  # Default values for customer-portal-ui.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.
  
  # -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
  replicaCount: 1
  
  # -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
  image:
    repository: labs64/customer-portal-ui
    # -- This sets the pull policy for images.
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: ""
  
  # -- This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  imagePullSecrets: []
  
  # -- This is to override the chart name.
  nameOverride: ""
  fullnameOverride: ""
  
  # -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: false
    # -- Automatically mount a ServiceAccount's API credentials?
    automount: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  
  # RBAC configuration (create RBAC resources: Role, RoleBinding)
  rbac:
    create: false
    rules: []
  
  # -- This is for setting Kubernetes Annotations to a Pod.
  podAnnotations: {}
  # -- This is for setting Kubernetes Labels to a Pod.
  podLabels: {}
  
  # -- Non-root pod security context. The image is nginx-unprivileged (UID 101), so the
  # whole pod runs unprivileged and listens on 8080.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: false
  
  # -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
  service:
    # -- This sets the service type
    type: ClusterIP
    # -- This sets the ports (non-privileged port served by nginx-unprivileged)
    port: 8080

  application:
    runtimeEnv:
      # -- Enable loading a runtime config file (env.json).
      enabled: true
      # -- Strict mode: if true, the container must not start when env.json is missing/invalid.
      strict: true
      # -- Absolute path in the container where env.json is mounted and served from.
      path: /usr/share/nginx/html/config/env.json
      # -- Key-value pairs written into env.json.
      env:
        # -- Primary API base URL — replace <HOST> with your domain/host.
        VITE_API_URL: https://<HOST>/customer-portal/api/v1
  
  
  gateway:
    # -- Publish this module's routes on the Traefik gateway
    enabled: false
    # -- Annotations for fallback Ingress
    annotations: {}
    # -- Ingress Class Name for fallback Ingress
    ingressClassName: ""
    # -- External path prefix; customer-portal-ui serves under /customer-portal
    prefix: "/customer-portal"
    # -- Gateway API parent Gateway(s) this module's HTTPRoute attaches to
    parentRefs:
      - name: labs64io-gateway
        namespace: tools
    # -- Names of the shared middlewares provided by the api-gateway chart (fullnameOverride: gateway-common)
    sharedMiddlewares:
      auth: gateway-common-auth
      rateLimit: gateway-common-ratelimit
      compress: gateway-common-compress
    # -- Routes exposed by this module
    routes:
      # -- Customer Portal UI static assets. Public: a plain browser navigation can't
      # attach a Bearer token, and the auth-proxy's ForwardAuth policy set is generated
      # from module OpenAPI specs, so it has no entry for a bare UI path anyway (would
      # 403 regardless). This module has no backend API of its own yet.
      - path: ""
        port: 8080
        public: true
  podDisruptionBudget:
    enabled: false
    minAvailable: 1
  
  networkPolicy:
    enabled: false
    # -- Namespace where Traefik runs
    gatewayNamespace: tools
    # -- Ingress controller pod-selector labels; defaults to the internal Traefik standard
    # (app.kubernetes.io/name: traefik) when empty
    # @schema
    # type: object
    # additionalProperties: true
    # @schema
    ingressControllerLabels: {}
    # -- Namespace the observability/OTel collector runs in
    observabilityNamespace: monitoring
    # -- Additional raw ingress rules
    extraIngress: []
  
  tests:
    enabled: true
    # -- Health endpoint probed by `helm test`
    healthPath: /
  
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}
