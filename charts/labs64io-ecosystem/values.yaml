enabled: true

# Labs64.IO Ecosystem Umbrella Chart Configuration

# Sub-charts Toggles
api-gateway:
  enabled: true
authz-pdp:
  enabled: true
checkout:
  enabled: true
payment-gateway:
  enabled: true
auditflow:
  enabled: true
api-docs:
  enabled: true
customer-portal:
  enabled: true

# Opt-In Infrastructure
postgresql:
  enabled: false
rabbitmq:
  enabled: false
redis:
  enabled: false

# Global Configuration Shared Across Ecosystem
# @schema
# type: object
# additionalProperties: true
# @schema
global:
  sharedConfig:
    enabled: true
    name: "labs64io-shared-config"
  sharedSecret:
    enabled: true
    name: "labs64io-shared-secret"
  
  # External dependencies (can be overridden to point to Bitnami subcharts if enabled)
  postgresql:
    host: "postgresql.tools.svc.cluster.local"
    port: 5432
    username: "labs64"
    database: "labs64io"
  rabbitmq:
    host: "rabbitmq.tools.svc.cluster.local"
    port: 5672
    username: "labs64"
  redis:
    host: "redis-master.tools.svc.cluster.local"
    port: 6379

secrets:
  # Base64 encoded secrets injected into labs64io-shared-secret
  postgresqlPassword: ""
  rabbitmqPassword: ""
  redisPassword: ""
