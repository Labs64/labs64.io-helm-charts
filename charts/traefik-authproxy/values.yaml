# -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
# The authproxy sits on the hot path of every protected request - keep at least 2 replicas.
replicaCount: 2

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: labs64/traefik-authproxy
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration (create RBAC resources: Role, RoleBinding)
# The auth proxy watches Services labeled labs64.io/auth-policy=true for policy discovery.
rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["services"]
      verbs: ["get", "list", "watch"]

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  runAsNonRoot: true
  runAsUser: 1064
  runAsGroup: 1064
  seccompProfile:
    type: RuntimeDefault

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8081

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- Signed edge-policy bundle (RFC-05 P0 — Provenance). When enabled, the ACS
# loads module auth policies from a cosign-signed OCI bundle pulled BY DIGEST and
# verified by an init container, instead of fetching them live from the module
# pods it authorizes (closes F2: self-authored runtime policy). Build/sign/push
# the bundle with labs64.io-authproxy/policy-bundle/build-bundle.sh.
policyBundle:
  # -- Enable bundle mode. Off = legacy live in-cluster /.well-known discovery.
  enabled: false
  # -- OCI registry holding the bundle (in-cluster reachable name).
  registry: labs64io-registry:5000
  # -- Repository path of the bundle artifact.
  repo: policies/labs64io
  # -- Immutable digest to pin (sha256:...). REQUIRED when enabled — this is what
  # ties the running ACS to a reviewed, signed artifact.
  digest: ""
  # -- Use plain HTTP (local dev registry). Set false for TLS registries.
  plainHttp: true
  # -- Cosign public key (PEM) that signed the bundle. REQUIRED when enabled.
  cosignPublicKey: ""
  # -- Init-container images for pull + verify.
  orasImage: ghcr.io/oras-project/oras:v1.2.0
  cosignImage: gcr.io/projectsigstore/cosign:v3.1.1

resources:
  limits:
    cpu: 200m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 512Mi

# -- This is to setup the liveness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: 8081
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 2

# -- This is to setup the readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  httpGet:
    path: /health/ready
    port: 8081
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2

# -- Startup probe (rendered by chart-libs.startupProbe): guards cold start so the
# liveness probe never kills a still-booting pod. Max boot budget = failureThreshold * periodSeconds.
startupProbe:
  httpGet:
    path: /health/ready
    port: 8081
  failureThreshold: 20
  periodSeconds: 3
  timeoutSeconds: 2

# -- Graceful shutdown: drain on rolling updates / scale-in (uvicorn handles SIGTERM;
# preStop gives Traefik/kube-proxy time to deregister the pod first).
terminationGracePeriodSeconds: 45
lifecycle:
  # -- preStop sleep (seconds) so Traefik/kube-proxy deregister the pod before shutdown; 0 disables
  preStopDrainSeconds: 5

# -- Observability is infrastructure-owned: the same image runs with or without it.
# When enabled, the image's opentelemetry-instrument entrypoint auto-instruments FastAPI
# (traces + correlated logs + metrics via OTLP).
observability:
  # -- Enable runtime auto-instrumentation (traces + logs + metrics via OTLP)
  enabled: false
  # -- OTLP endpoint of the OpenTelemetry Collector
  otlpEndpoint: "http://$(NODE_IP):4318"

# -- This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

env:
  # -- OIDC discovery URL. Override per environment:
  #   production: http://keycloak.tools.svc.cluster.local/realms/labs64io/.well-known/openid-configuration
  #   local dev:  http://mock-oidc.tools.svc.cluster.local:8080/labs64io/.well-known/openid-configuration
  - name: OIDC_DISCOVERY_URL
    value: http://keycloak.tools.svc.cluster.local/realms/labs64io/.well-known/openid-configuration
  # -- Audience for the auth proxy.
  - name: OIDC_AUDIENCE
    value: account
  # -- Log level for the auth proxy.
  - name: LOG_LEVEL
    value: INFO
  # -- Dot-paths (comma-separated) to collect scopes from the JWT; "{audience}" expands to OIDC_AUDIENCE.
  # Default: scope,realm_access.roles,resource_access.{audience}.roles.
  - name: TOKEN_SCOPES_CLAIM_PATHS
    value: "scope,realm_access.roles,resource_access.{audience}.roles"
  # -- Dot-path to the tenant claim for X-Auth-Tenant; "-" is emitted when absent.
  - name: TOKEN_TENANT_CLAIM_PATH
    value: "tenant"
  # -- Static prefix policies file (rendered from .Values.staticPolicies)
  - name: STATIC_POLICY_FILE
    value: /opt/application-config/static_policies.yaml
  # -- Periodic auth-policy re-fetch interval (seconds); the Service watch
  # triggers immediate refreshes, this is the belt-and-suspenders floor.
  - name: POLICY_REFRESH_INTERVAL
    value: "30"
  - name: POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace

# -- Static prefix policies for gateway surfaces without an OpenAPI spec
# (UI bundles). Longest prefix wins; consulted only when no module
# auth-policy route matches. Scope check is any-overlap with the token's
# TOKEN_SCOPES_CLAIM_PATHS claims.
# TODO: remove after the corresponding modules will be using OpenAPI
staticPolicies:
  - path: /checkout
    scopes:
      - checkout-role
  - path: /customer-portal
    scopes:
       - customer-portal-role

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}

# -- PodDisruptionBudget (rendered by chart-libs.pdb)
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# -- NetworkPolicy: allow ingress from Traefik and same-namespace pods only (rendered by chart-libs.networkpolicy)
networkPolicy:
  enabled: false
  # -- Namespace where Traefik runs
  gatewayNamespace: tools
  # -- Additional raw ingress rules
  extraIngress: []
