{{- if .Values.policyBundle.enabled }}
{{- if not .Values.policyBundle.cosignPublicKey }}
{{- fail "policyBundle.enabled requires policyBundle.cosignPublicKey (the cosign public key that signed the bundle)" }}
{{- end }}
# Cosign public key used by the policy-bundle-verify init container to verify the
# signed edge-policy bundle before the ACS starts (RFC-05 P0).
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart-libs.fullname" . }}-policy-bundle-pubkey
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
data:
  cosign.pub: |
    {{- .Values.policyBundle.cosignPublicKey | nindent 4 }}
{{- end }}
