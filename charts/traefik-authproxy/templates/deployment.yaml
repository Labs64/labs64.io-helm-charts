apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-libs.fullname" . }}
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart-libs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "chart-libs.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chart-libs.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "chart-libs.fullname" . }}
            - secretRef:
                name: {{ include "chart-libs.fullname" . }}
          volumeMounts:
            - name: role-mapping
              mountPath: /opt/application-config
              readOnly: true
          {{- if .Values.roleMappingSidecar.enabled }}
            - name: role-mapping-fragments
              mountPath: {{ .Values.roleMappingSidecar.folder }}
              readOnly: true
          {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.roleMappingSidecar.enabled }}
        - name: role-mapping-sidecar
          image: "{{ .Values.roleMappingSidecar.image.repository }}:{{ .Values.roleMappingSidecar.image.tag }}"
          imagePullPolicy: {{ .Values.roleMappingSidecar.image.pullPolicy }}
          env:
            - name: LABEL
              value: {{ .Values.roleMappingSidecar.label | quote }}
            - name: LABEL_VALUE
              value: {{ .Values.roleMappingSidecar.labelValue | quote }}
            - name: FOLDER
              value: {{ .Values.roleMappingSidecar.folder | quote }}
            - name: RESOURCE
              value: configmap
            - name: NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: REQ_URL
              value: "http://localhost:{{ .Values.service.port }}/reload"
            - name: REQ_METHOD
              value: POST
          {{- with .Values.roleMappingSidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: role-mapping-fragments
              mountPath: {{ .Values.roleMappingSidecar.folder }}
        {{- end }}
      volumes:
        - name: role-mapping
          configMap:
            name: {{ include "chart-libs.fullname" . }}-role-mapping
        {{- if .Values.roleMappingSidecar.enabled }}
        - name: role-mapping-fragments
          emptyDir: {}
        {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
