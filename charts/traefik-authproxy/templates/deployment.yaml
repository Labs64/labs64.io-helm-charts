apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chart-libs.fullname" . }}
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "chart-libs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "chart-libs.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "chart-libs.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 45 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.policyBundle.enabled }}
      {{- $pb := .Values.policyBundle }}
      {{- $ref := printf "%s/%s@%s" $pb.registry $pb.repo (required "policyBundle.digest is required in bundle mode" $pb.digest) }}
      initContainers:
        # Provenance: pull the edge-policy bundle BY DIGEST and verify
        # its cosign signature before the ACS starts. Policy comes only from this
        # signed artifact — never from the module pods it authorizes (F2 closed).
        - name: policy-bundle-pull
          image: {{ $pb.orasImage | quote }}
          command: ["oras", "pull"]
          args:
            {{- if $pb.plainHttp }}
            - "--plain-http"
            {{- end }}
            - "--output"
            - "/bundle"
            - {{ $ref | quote }}
          volumeMounts:
            - name: policy-bundle
              mountPath: /bundle
        - name: policy-bundle-verify
          image: {{ $pb.cosignImage | quote }}
          # Fails closed: a bad/absent signature aborts pod startup.
          command: ["cosign", "verify"]
          args:
            - "--key"
            - "/keys/cosign.pub"
            - "--insecure-ignore-tlog"
            {{- if $pb.plainHttp }}
            - "--allow-http-registry"
            {{- end }}
            - {{ $ref | quote }}
          volumeMounts:
            - name: policy-bundle-pubkey
              mountPath: /keys
              readOnly: true
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- include "chart-libs.preStopDrain" . | nindent 10 }}
          {{- include "chart-libs.startupProbe" . | nindent 10 }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
          {{- include "chart-libs.observability.pythonEnv" . | nindent 12 }}
          {{- if .Values.policyBundle.enabled }}
            - name: POLICY_BUNDLE_DIR
              value: /bundle
            - name: POLICY_BUNDLE_DIGEST
              value: {{ .Values.policyBundle.digest | quote }}
          {{- end }}
            - name: CEDAR_MODE
              value: {{ .Values.cedar.mode | quote }}
          {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "chart-libs.fullname" . }}
            - secretRef:
                name: {{ include "chart-libs.fullname" . }}
          volumeMounts:
            - name: static-policies
              mountPath: /opt/application-config
              readOnly: true
            {{- if .Values.policyBundle.enabled }}
            - name: policy-bundle
              mountPath: /bundle
              readOnly: true
            {{- end }}
          {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: static-policies
          configMap:
            name: {{ include "chart-libs.fullname" . }}-static-policies
        {{- if .Values.policyBundle.enabled }}
        - name: policy-bundle
          emptyDir: {}
        - name: policy-bundle-pubkey
          configMap:
            name: {{ include "chart-libs.fullname" . }}-policy-bundle-pubkey
        {{- end }}
      {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
