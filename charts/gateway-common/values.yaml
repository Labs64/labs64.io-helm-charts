# -- Fixed resource-name prefix so module charts can reference middlewares by a stable name
fullnameOverride: gateway-common

# -- This is to override the chart name.
nameOverride: ""

# -- ForwardAuth middleware configuration (OIDC/JWT validation via traefik-authproxy)
authProxy:
  # -- Full URL override for the traefik-authproxy /auth endpoint; when empty the address is derived as http://<serviceName>.<release-namespace>.svc.cluster.local:<port>/auth
  address: ""
  # -- Service name of the traefik-authproxy release
  serviceName: labs64io-traefik-authproxy
  # -- Service port of the traefik-authproxy release
  port: 8081
  # -- Trust X-Forwarded-* headers from the proxy
  trustForwardHeader: true
  # -- Identity headers copied from the authproxy response onto the upstream request
  authResponseHeaders:
    - X-Auth-User
    - X-Auth-Roles

# -- Rate limit middleware configuration
rateLimit:
  # -- Average requests per second
  average: 100
  # -- Burst size
  burst: 50
  # -- Rate-limit per authenticated user (X-Auth-User header set by the auth middleware); falls back to per-IP when absent
  perUser: true

# -- Security headers middleware configuration
securityHeaders:
  frameDeny: true
  contentTypeNosniff: true
  browserXssFilter: true
  referrerPolicy: "strict-origin-when-cross-origin"
  contentSecurityPolicy: "default-src 'self'; script-src 'self'; object-src 'none'"
  forceSTSHeader: true
  stsSeconds: 31536000
  stsIncludeSubdomains: true

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}
