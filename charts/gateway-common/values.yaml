# -- Fixed resource-name prefix so module charts can reference middlewares by a stable name
fullnameOverride: gateway-common

# -- This is to override the chart name.
nameOverride: ""

# -- ForwardAuth middleware configuration (OIDC/JWT validation via traefik-authproxy)
authProxy:
  # -- Full URL override for the traefik-authproxy /auth endpoint; when empty the address is derived as http://<serviceName>.<release-namespace>.svc.cluster.local:<port>/auth
  address: ""
  # -- Service name of the traefik-authproxy release
  serviceName: labs64io-traefik-authproxy
  # -- Service port of the traefik-authproxy release
  port: 8081
  # -- Trust X-Forwarded-* headers from the proxy
  trustForwardHeader: true
  # -- Identity headers copied from the authproxy response onto the upstream request (the authproxy emits every one on each 2xx, so client values can never pass through)
  authResponseHeaders:
    - X-Auth-User
    - X-Auth-Scopes
    - X-Auth-Tenant
    - X-Request-ID

# -- Rate limit middleware configuration
rateLimit:
  # -- Average requests per second
  average: 100
  # -- Burst size
  burst: 50
  # -- Rate-limit per authenticated user (X-Auth-User header set by the auth middleware); falls back to per-IP when absent
  perUser: true

# -- Buffering middleware configuration (limits payload sizes to prevent OOM / large event attacks)
buffering:
  # -- Enable the shared buffering middleware
  enabled: true
  # -- Maximum allowed request body size in bytes (default 2.5MB)
  maxRequestBodyBytes: 2621440


# -- Response-compression middleware (edge optimization for all modules routed through Traefik)
compress:
  # -- Enable the shared compress middleware
  enabled: true
  # -- Do not compress responses below this size (bytes)
  minResponseBodyBytes: 1024
  # -- Content types excluded from compression (already-compressed formats)
  excludedContentTypes:
    - image/png
    - image/jpeg
    - image/gif
    - image/webp
    - application/grpc

# -- Security response headers are now emitted as a native Gateway API
# ResponseHeaderModifier filter on each HTTPRoute rule; the canonical values live
# in the chart-libs "chart-libs.securityHeaders" helper. (The former Traefik
# security-headers Middleware has been removed.)

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}
