apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chart-libs.fullname" . }}-auth
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  forwardAuth:
    address: {{ .Values.authProxy.address | default (printf "http://%s.%s.svc.cluster.local:%v/auth" .Values.authProxy.serviceName .Release.Namespace .Values.authProxy.port) | quote }}
    trustForwardHeader: {{ .Values.authProxy.trustForwardHeader }}
    authResponseHeaders:
      {{- toYaml .Values.authProxy.authResponseHeaders | nindent 6 }}
---
# Drops inbound X-Auth-* ahead of ForwardAuth (spoofing prevention,
# edge-stripping layer). Attached first on every gateway route — public routes
# included, where no ForwardAuth response would otherwise overwrite them.
# An empty customRequestHeaders value removes the header in Traefik.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chart-libs.fullname" . }}-strip-auth-headers
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  headers:
    customRequestHeaders:
      X-Auth-User: ""
      X-Auth-Roles: ""
      X-Auth-Tenant: ""
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chart-libs.fullname" . }}-ratelimit
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  rateLimit:
    average: {{ .Values.rateLimit.average }}
    burst: {{ .Values.rateLimit.burst }}
    {{- if .Values.rateLimit.perUser }}
    sourceCriterion:
      requestHeaderName: X-Auth-User
    {{- end }}
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chart-libs.fullname" . }}-security-headers
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  headers:
    {{- toYaml .Values.securityHeaders | nindent 4 }}
{{- if .Values.compress.enabled }}
---
# Response compression at the edge — a safe, universal frontstore optimization for
# all Labs64.IO modules routed through Traefik. Referenced by chart-libs.gateway-routes
# when a module sets gateway.sharedMiddlewares.compress.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ include "chart-libs.fullname" . }}-compress
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  compress:
    {{- with .Values.compress.excludedContentTypes }}
    excludedContentTypes:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    minResponseBodyBytes: {{ .Values.compress.minResponseBodyBytes | default 1024 }}
{{- end }}
