# Default values for checkout-ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: labs64/checkout-ui
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: false
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration (create RBAC resources: Role, RoleBinding)
rbac:
  create: false
  rules: []
    #- apiGroups: [""]
    #  resources: ["pods"]
    #  verbs: ["get", "list", "watch"]

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -- Non-root pod security context. The image is nginx-unprivileged (UID 101), so the
# whole pod runs unprivileged and listens on 8080.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 101
  runAsGroup: 101
  fsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  # Non-privileged port served by nginx-unprivileged.
  port: 8080

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: localhost
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- IngressRoute configuration for Traefik more information can be found here: https://doc.traefik.io/traefik/routing/providers/kubernetes-crd/
ingressroute:
  # -- This sets whether the IngressRoute is enabled or not
  enabled: false
  # -- Host for the IngressRoute
  host: localhost
  # -- Entry points for the IngressRoute
  entryPoints:
    - web
    - websecure

resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

# -- This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 2

# -- This is to setup the readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2

# -- Startup probe (rendered by chart-libs.startupProbe): nginx starts fast, but this
# keeps rollout semantics uniform across the ecosystem.
startupProbe:
  httpGet:
    path: /
    port: 8080
  failureThreshold: 10
  periodSeconds: 3
  timeoutSeconds: 2

# -- Graceful shutdown: let Traefik/kube-proxy deregister the pod before nginx stops.
terminationGracePeriodSeconds: 30
lifecycle:
  # -- preStop sleep (seconds) so the gateway deregisters the pod before shutdown; 0 disables
  preStopDrainSeconds: 5

# -- This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

env: []

# -- Secret data to be used as environment variables
secrets:
  data: {}

application:
  runtimeEnv:
    # -- Enable loading a runtime config file (env.json).
    enabled: true
    # -- Strict mode: if true, the container must not start when env.json is missing/invalid (e.g., ConfigMap not mounted).
    strict: true
    # -- Absolute path in the container where env.json is mounted and served from (must match Nginx/Ingress config).
    path: /usr/share/nginx/html/config/env.json
    # -- Key-value pairs written into env.json. Keys should match variables your UI reads (for Vite, use the VITE_* prefix).
    env:
      # -- Primary API base URL — replace <HOST> with your domain/host.
      VITE_API_URL: https://<HOST>/api/v1/checkout

# -- Gateway routes published by this module (rendered by chart-libs.gateway-routes)
gateway:
  # -- Publish this module's routes on the Traefik gateway
  enabled: false
  # -- External path prefix; checkout-ui serves under /checkout
  prefix: "/checkout"
  # -- Traefik entry points
  entryPoints:
    - web
    - websecure
  # -- Names of the shared middlewares provided by the gateway-common chart
  sharedMiddlewares:
    auth: gateway-common-auth
    rateLimit: gateway-common-ratelimit
    securityHeaders: gateway-common-security-headers
    compress: gateway-common-compress
  # -- Routes exposed by this module
  routes:
    # -- Checkout UI (protected)
    - path: ""
      port: 8080
      roles:
        - admin-role
        - ecommerce-role
        - default-roles-labs64io
# -- PodDisruptionBudget (rendered by chart-libs.pdb)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- NetworkPolicy: allow ingress from Traefik and same-namespace pods only (rendered by chart-libs.networkpolicy)
networkPolicy:
  enabled: false
  # -- Namespace where Traefik runs
  gatewayNamespace: tools
  # -- Additional raw ingress rules
  extraIngress: []

# -- helm test hook (rendered by chart-libs.test-connection)
tests:
  enabled: true
  # -- Health endpoint probed by `helm test`
  healthPath: /

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}
