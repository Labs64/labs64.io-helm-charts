{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "chart-libs.fullname" . }}
  labels:
    {{- include "chart-libs.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  hostnames:
    - {{ include "chart-libs.gatewayHost" . | quote }}
  rules:
    {{- range $route := .Values.gateway.routes }}
    - matches:
        - path:
            type: {{ $route.pathType | default "PathPrefix" }}
            value: {{ $route.path | quote }}
      filters:
        {{- /* Root convenience redirect: 302 to a fixed path (native RequestRedirect). */}}
        {{- if $route.redirectTo }}
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: {{ $route.redirectTo | quote }}
            statusCode: 302
        {{- end }}
        {{- /* Strip the matched prefix before forwarding (native URLRewrite). */}}
        {{- if $route.stripPrefix }}
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        {{- end }}
      {{- if not $route.redirectTo }}
      backendRefs:
        - name: {{ $route.service.name }}
          port: {{ $route.service.port }}
      {{- end }}
    {{- end }}
{{- end }}
