enabled: true

externalSecrets:
  enabled: false
  storeName: local-kubernetes-store
# -- Global values shared across Labs64.IO charts and Bitnami subcharts
# @schema
# type: object
# additionalProperties: true
# @schema
global:
  security:
    # -- Required by Bitnami subcharts when images are pulled from bitnamilegacy (image substitution guard)
    allowInsecureImages: true

# -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: labs64/payment-gateway
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# RBAC configuration (create RBAC resources: Role, RoleBinding)
rbac:
  create: false
  rules: []
    #- apiGroups: [""]
    #  resources: ["pods"]
    #  verbs: ["get", "list", "watch"]

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  capabilities:
    drop:
    - ALL
  runAsNonRoot: true
  runAsUser: 1064
  runAsGroup: 1064
  seccompProfile:
    type: RuntimeDefault

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 512Mi

# -- This is to setup the liveness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 2

# -- This is to setup the readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 3
  timeoutSeconds: 2

# -- Startup probe (rendered by chart-libs.startupProbe): guards slow cold starts
# (Spring Boot + OTel Java Agent) so the liveness probe never kills a still-booting
# pod. Max boot budget = failureThreshold * periodSeconds.
startupProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  failureThreshold: 30
  periodSeconds: 5
  timeoutSeconds: 2

# -- Graceful shutdown: drain in-flight requests on rolling updates / scale-in.
# Keep terminationGracePeriodSeconds > lifecycle.preStopDrainSeconds + gracefulShutdown.timeout.
terminationGracePeriodSeconds: 45
gracefulShutdown:
  # -- Max time Spring Boot waits for in-flight requests before forced shutdown
  timeout: 30s
lifecycle:
  # -- preStop sleep (seconds) so Traefik/kube-proxy deregister the pod before shutdown; 0 disables
  preStopDrainSeconds: 5

# -- Observability is infrastructure-owned: the same image runs with or without it.
# When enabled, the bundled OTel Java Agent is activated via JAVA_TOOL_OPTIONS and
# Prometheus scrape annotations (Micrometer /actuator/prometheus) are added.
observability:
  # -- Enable runtime instrumentation (traces + logs via OTLP; metrics via Prometheus scrape)
  enabled: false
  # -- OTLP endpoint of the OpenTelemetry Collector
  otlpEndpoint: "http://$(NODE_IP):4318"
  # -- Prometheus metrics path scraped from the pod
  metricsPath: /actuator/prometheus

# -- This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

env: []
envFrom: []

# -- Secret data to be used as environment variables (delivered via envFrom).
# External installs supply broker/database/cache credentials here, e.g.
#   SPRING_RABBITMQ_USERNAME / SPRING_RABBITMQ_PASSWORD, SPRING_DATASOURCE_USERNAME / SPRING_DATASOURCE_PASSWORD, SPRING_DATA_REDIS_PASSWORD.
# When rabbitmq.enabled=true / postgresql.enabled=true / redis.enabled=true the chart adds these keys automatically from rabbitmq.auth / postgresql.auth / redis.auth.
# Keys you set here take precedence over the bundled-dep keys. On helm upgrade the Secret is deleted and recreated (hook-managed).
# Note: the Secret is hook-managed (pre-install) and survives helm uninstall.
# @schema
# type: object
# properties:
#   data:
#     type: object
#     additionalProperties: true
# @schema
secrets:
  data: {}

# -- Optional bundled RabbitMQ (Bitnami subchart) for standalone/local installs.
# Dev-grade credentials - NOT for AWS QA / Prod or Users' Own Infrastructure; point applicationYaml at your own broker instead.
# @schema
# type: object
# additionalProperties: true
# @schema

# -- Optional bundled PostgreSQL (Bitnami subchart) for standalone/local installs.
# Dev-grade credentials - NOT for AWS QA / Prod or Users' Own Infrastructure; point applicationYaml at your own database instead.
# @schema
# type: object
# additionalProperties: true
# @schema

# -- Optional bundled Redis (Bitnami subchart) for standalone/local installs.
# Dev-grade credentials - NOT for AWS QA / Prod or Users' Own Infrastructure; point applicationYaml at your own Redis instead.
# @schema
# type: object
# additionalProperties: true
# @schema

# -- Additional application properties
applicationYaml:
  # -- Spring configuration
  spring:
    datasource:
      # -- JDBC URL; resolves to the bundled subchart when postgresql.enabled, else set your database URL
      # Username/password are NOT set here — this block renders into a plain ConfigMap.
      # Set credentials via `secrets.data.SPRING_DATASOURCE_USERNAME`/`SPRING_DATASOURCE_PASSWORD`
      # (a Secret, injected via envFrom) instead — see `secrets.data` below.
      url: "jdbc:postgresql://{{ if and .Values.global .Values.global.postgresql }}{{ .Values.global.postgresql.host | default \"postgresql.tools.svc.cluster.local\" }}:{{ .Values.global.postgresql.port | default 5432 }}{{ else }}postgresql.tools.svc.cluster.local:5432{{ end }}/payment_gateway"
    rabbitmq:
      # -- RabbitMQ host
      host: "{{ if and .Values.global .Values.global.rabbitmq }}{{ .Values.global.rabbitmq.host | default \"rabbitmq.tools.svc.cluster.local\" }}{{ else }}rabbitmq.tools.svc.cluster.local{{ end }}"
      # -- RabbitMQ port
      port: '{{ if and .Values.global .Values.global.rabbitmq }}{{ .Values.global.rabbitmq.port | default 5672 }}{{ else }}5672{{ end }}'
    data:
      redis:
        # -- Redis host
        host: "{{ if and .Values.global .Values.global.redis }}{{ .Values.global.redis.host | default \"redis.tools.svc.cluster.local\" }}{{ else }}redis.tools.svc.cluster.local{{ end }}"
        # -- Redis port
        port: '{{ if and .Values.global .Values.global.redis }}{{ .Values.global.redis.port | default 6379 }}{{ else }}6379{{ end }}'



# -- Gateway routes published by this module (rendered by chart-libs.gateway-routes)
gateway:
  # -- Publish this module's routes on the Traefik gateway
  enabled: false
  # -- Annotations for fallback Ingress
  annotations: {}
  # -- Ingress Class Name for fallback Ingress
  ingressClassName: ""
  # -- External path prefix; defaults to /<chart-name>
  prefix: ""
  # -- Gateway API parent Gateway(s) this module's HTTPRoute attaches to
  parentRefs:
    - name: labs64io-gateway
      namespace: tools
  # -- Names of the shared middlewares provided by the api-gateway chart (fullnameOverride: gateway-common)
  sharedMiddlewares:
    auth: gateway-common-auth
    rateLimit: gateway-common-ratelimit
    compress: gateway-common-compress
  # -- Auth-policy publication. NOTE: the traefik-authproxy no longer
  # live-discovers per-module policies via /.well-known/auth-policy — it loads a
  # generated routes manifest (charts/api-gateway/routes/) and asks the
  # central Cerbos PDP for every decision. This block is retained for backward
  # compatibility and is a no-op for edge enforcement.
  authPolicy:
    # -- Publish this module's auth policy to the gateway ACS
    enabled: true
    # -- External base path prepended to the module's OpenAPI paths; defaults to <prefix>/api/v1
    basePath: ""
  # -- Routes exposed by this module.
  # The whole API surface is ONE route through ForwardAuth: the authproxy is the
  # PEP and derives public-vs-protected per operation from OpenAPI x-labs64-auth
  # (generated into the authproxy routes manifest + the central Cerbos PDP). Public
  # operations (payment-definitions, PSP webhooks, provider/checkout redirect returns
  # — none can carry a JWT) are allowed without a token by the authproxy itself, so
  # they MUST NOT be re-declared here. Re-declaring them as edge routes duplicates
  # the OpenAPI PEP and mis-strips their paths. OpenAPI stays the single source of truth.
  routes:
    # -- Whole Payment Gateway API (ForwardAuth PEP decides per-op from OpenAPI;
    # strips '<prefix>/api/v1' — backend is root-mapped)
    - path: /api/v1
      port: 8080
      stripPath: true
    # -- OpenAPI docs (springdoc endpoint — NOT an OpenAPI operation, so it has no
    # x-labs64-auth policy at the authproxy; public at the edge, prefix stripped)
    - path: /v3/api-docs
      port: 8080
      public: true
      stripPrefix: true

# -- PodDisruptionBudget (rendered by chart-libs.pdb)
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# -- NetworkPolicy: allow ingress from Traefik and same-namespace pods only (rendered by chart-libs.networkpolicy)
networkPolicy:
  enabled: false
  # -- Namespace where Traefik runs
  gatewayNamespace: tools
  # -- Ingress controller pod-selector labels; defaults to the internal Traefik standard
  # (app.kubernetes.io/name: traefik) when empty
  # @schema
  # type: object
  # additionalProperties: true
  # @schema
  ingressControllerLabels: {}
  # -- Namespace the observability/OTel collector runs in
  observabilityNamespace: monitoring
  # -- Additional raw ingress rules
  extraIngress: []
  # -- Tools-namespace destinations this service needs (name + port pairs); rendered as
  # scoped egress rules — NOT a blanket allow to the whole tools namespace — to preserve
  # database-per-service isolation.
  toolsEgress:
    - name: rabbitmq
      port: 5672
    - name: postgresql
      port: 5432
    - name: redis
      port: 6379
  # -- Egress rules enforcing database-per-service isolation.
  egress:
    # Cerbos PDP: @Authorize decisions over gRPC.
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: authz-pdp
      ports:
        - protocol: TCP
          port: 3593
# -- SLO recording rules and dashboards (rendered by chart-libs.slo.*)
slo:
  enabled: true
  availability:
    targetRatio: 0.999
  latency:
    targetRatio: 0.99
    thresholdSeconds: 0.5

# -- Values passed to the chart-libs library dependency (present so the generated schema accepts the key Helm injects for the dependency)
# @schema
# type: object
# additionalProperties: true
# @schema
chart-libs: {}

# -- helm test hook (rendered by chart-libs.test-connection)
tests:
  enabled: true
  # -- Health endpoint probed by `helm test`
  healthPath: /actuator/health
applicationType: java
