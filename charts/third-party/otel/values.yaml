mode: "deployment" # Can be daemonset, deployment, or statefulset

image:
  repository: grafana/otel-lgtm
  tag: "latest"
  pullPolicy: IfNotPresent

config:
  receivers:
    otlp:
      protocols:
        grpc: {}
        http: {}

    prometheus:
      config:
        scrape_configs:
          - job_name: 'kubernetes-pods'
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: true

  processors:
    batch:
      send_batch_size: 1000
      timeout: 10s

  exporters:
    prometheusremotewrite:
      endpoint: "http://prometheus-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
    loki:
      endpoint: "http://loki-write.monitoring.svc.cluster.local:3100/loki/api/v1/push"
    otlp/tempo:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true

  service:
    pipelines:
      metrics:
        receivers: [otlp, prometheus]
        processors: [batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp]
        processors: [batch]
        exporters: [loki]
      traces:
        receivers: [otlp]
        processors: [batch]
        exporters: [otlp/tempo]
