image:
  repository: localhost:5005/traefik-authproxy
  tag: latest

env:
  # mock-oauth2-server (just mock-oidc-install)
  - name: OIDC_DISCOVERY_URL
    value: http://mock-oidc.tools.svc.cluster.local:8080/labs64io/.well-known/openid-configuration
  - name: OIDC_AUDIENCE
    value: account
  - name: ROLE_MAPPING_FILE
    value: /opt/application-config/role_mapping.yaml
  - name: ROLE_MAPPING_DIR
    value: /opt/role-mappings
  - name: LOG_LEVEL
    value: DEBUG

# -- authproxy/system public paths only; module paths are provided by
# per-module ConfigMap fragments (label labs64.io/role-mapping=true)
roleMapping:
  /auth: []
  /health: []
  /docs: []
