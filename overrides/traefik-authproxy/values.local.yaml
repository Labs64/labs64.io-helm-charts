image:
  repository: localhost:5005/traefik-authproxy
  tag: latest
  pullPolicy: Always

networkPolicy:
  enabled: true

env:
  # mock-oauth2-server (just mock-oidc-install)
  - name: OIDC_DISCOVERY_URL
    value: http://mock-oidc.tools.svc.cluster.local:8080/labs64io/.well-known/openid-configuration
  - name: OIDC_AUDIENCE
    value: account
  - name: LOG_LEVEL
    value: DEBUG
  # Dot-paths (comma-separated) to collect scopes from the JWT; "{audience}" expands to OIDC_AUDIENCE.
  - name: TOKEN_SCOPES_CLAIM_PATHS
    value: "scope,realm_access.roles,resource_access.{audience}.roles"
  # Dot-path to the tenant claim for X-Auth-Tenant; "-" is emitted when absent.
  - name: TOKEN_TENANT_CLAIM_PATH
    value: "tenant"
  - name: STATIC_POLICY_FILE
    value: /opt/application-config/static_policies.yaml
  # Periodic auth-policy re-fetch floor; the Service watch triggers immediate refreshes.
  - name: POLICY_REFRESH_INTERVAL
    value: "30"
  # Namespace searched for labs64.io/auth-policy=true labeled Services.
  - name: POD_NAMESPACE
    valueFrom:
      fieldRef:
        fieldPath: metadata.namespace
