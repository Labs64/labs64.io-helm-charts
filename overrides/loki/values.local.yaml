# Loki configuration for local development
# Single-binary mode with local filesystem storage
deploymentMode: SingleBinary
loki:
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3100"
  auth_enabled: false
  useTestSchema: true
  commonConfig:
    replication_factor: 1
  storage:
    bucketNames:
      chunks: chunks
      ruler: ruler
      admin: admin
  singleBinary:
    replicas: 1
    persistence:
      enabled: false
    resources:
      requests:
        memory: 256Mi
      limits:
        memory: 512Mi
gateway:
  enabled: false
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
monitor:
  enabled: false
test:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
#lokiCanary:
#  enabled: true
