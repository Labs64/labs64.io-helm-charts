apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: local-kubernetes-store
spec:
  provider:
    kubernetes:
      server:
        url: "https://kubernetes.default.svc"
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: default
      remoteNamespace: tools
      auth:
        serviceAccount:
          name: "external-secrets"
          namespace: "tools"
---
# We also need to give ESO permissions to read secrets in the tools namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-secret-reader
  namespace: tools
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-secret-reader-binding
  namespace: tools
subjects:
- kind: ServiceAccount
  name: external-secrets
  namespace: tools
roleRef:
  kind: Role
  name: eso-secret-reader
  apiGroup: rbac.authorization.k8s.io
