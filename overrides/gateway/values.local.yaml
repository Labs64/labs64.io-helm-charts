global:
  domain: localhost

ingressroute:

  # -- Define IngressRoute(s) for labs64io-gateway (module routes are owned by the module charts)
  routes:
    # -- Map Swagger UI to the root path (public — no auth required)
    - path: /swagger-ui
      service:
        name: labs64io-gateway
        port: 8080
      middlewares:
        - name: strip-prefix-middleware

  # -- Middlewares owned by the gateway chart itself
  middlewares:
    # -- Strip Prefix Middleware (swagger-ui only)
    - name: strip-prefix-middleware
      spec:
        stripPrefix:
          prefixes:
            - /swagger-ui

# -- Swagger UI Configuration (urls templated via global.domain)
swaggerUI:
  urls:
    - url: http://gateway.{{ .Values.global.domain }}/auditflow/v3/api-docs
      name: AuditFlow API
    - url: http://gateway.{{ .Values.global.domain }}/checkout/v3/api-docs
      name: Checkout API
    - url: http://gateway.{{ .Values.global.domain }}/payment-gateway/v3/api-docs
      name: Payment Gateway API
    - url: http://gateway.{{ .Values.global.domain }}/customer-portal/v3/api-docs
      name: Customer Portal API
