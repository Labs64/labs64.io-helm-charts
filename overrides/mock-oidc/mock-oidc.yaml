# DEV ONLY: mock OIDC provider for local M2M testing.
# Issues signed JWTs with Keycloak-shaped realm_access.roles claims for ANY
# client_credentials request. Never deploy outside local environments.
#
# The `scope` request param selects the token shape:
#   - Named personas (auditflow / ecommerce / no-access / admin) issue a fixed,
#     curated scope set — convenient shorthand for coarse role testing.
#   - ANY OTHER value is echoed verbatim into the JWT `scope` claim (${scope}),
#     so you can mint a token with EXACTLY the scopes you ask for and assert
#     fine-grained authorization (e.g. `audit-event:read` must NOT satisfy a
#     route requiring `audit-event:write`). Unrecognized strings therefore grant
#     only themselves — never accidental admin.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-oidc-config
  namespace: tools
  annotations:
    labs64.io/warning: "DEV ONLY - mock OIDC provider; never deploy outside local environments"
data:
  config.json: |
    {
      "interactiveLogin": false,
      "httpServer": "NettyWrapper",
      "tokenCallbacks": [
        {
          "issuerId": "labs64io",
          "tokenExpiry": 3600,
          "requestMappings": [
            {
              "requestParam": "scope",
              "match": "auditflow-tenant-2",
              "claims": {
                "sub": "svc:auditflow-client-2",
                "tenant": "t_mock_2",
                "aud": ["account"],
                "scope": "audit-event:write",
                "realm_access": { "roles": ["auditflow-role", "default-roles-labs64io"] }
              }
            },
            {
              "requestParam": "scope",
              "match": "auditflow",
              "claims": {
                "sub": "svc:auditflow-client",
                "tenant": "t_mock",
                "aud": ["account"],
                "scope": "audit-event:write",
                "realm_access": { "roles": ["auditflow-role", "default-roles-labs64io"] }
              }
            },
            {
              "requestParam": "scope",
              "match": "ecommerce",
              "claims": {
                "sub": "svc:ecommerce-client",
                "tenant": "t_mock",
                "aud": ["account"],
                "scope": "customer:read customer:write purchase-order:read purchase-order:write purchase-order:checkout checkout-transaction:read payment:read payment:write payment:pay payment-provider:read payment-transaction:read",
                "realm_access": { "roles": ["ecommerce-role", "default-roles-labs64io"] }
              }
            },
            {
              "requestParam": "scope",
              "match": "no-access",
              "claims": {
                "sub": "svc:no-access-client",
                "aud": ["account"],
                "realm_access": { "roles": ["no-access-role"] }
              }
            },
            {
              "requestParam": "scope",
              "match": "admin",
              "claims": {
                "sub": "svc:admin-client",
                "tenant": "t_mock",
                "aud": ["account"],
                "scope": "audit-event:write customer:read customer:write purchase-order:read purchase-order:write purchase-order:checkout checkout-transaction:read payment:read payment:write payment:pay payment-provider:read payment-provider:write payment-transaction:read",
                "realm_access": { "roles": ["admin-role", "default-roles-labs64io"] }
              }
            },
            {
              "requestParam": "scope",
              "match": "*",
              "claims": {
                "sub": "svc:local-test",
                "tenant": "t_mock",
                "aud": ["account"],
                "scope": "${scope}",
                "realm_access": { "roles": ["default-roles-labs64io"] }
              }
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oidc
  namespace: tools
  labels:
    app.kubernetes.io/name: mock-oidc
  annotations:
    labs64.io/warning: "DEV ONLY - mock OIDC provider; never deploy outside local environments"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-oidc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-oidc
    spec:
      containers:
        - name: mock-oauth2-server
          image: ghcr.io/navikt/mock-oauth2-server:2.1.10
          ports:
            - containerPort: 8080
          env:
            - name: JSON_CONFIG_PATH
              value: /config/config.json
          volumeMounts:
            - name: config
              mountPath: /config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: mock-oidc-config
---
apiVersion: v1
kind: Service
metadata:
  name: mock-oidc
  namespace: tools
  annotations:
    labs64.io/warning: "DEV ONLY - mock OIDC provider; never deploy outside local environments"
spec:
  selector:
    app.kubernetes.io/name: mock-oidc
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mock-oidc
  namespace: tools
  annotations:
    labs64.io/warning: "DEV ONLY - mock OIDC provider; never deploy outside local environments"
spec:
  parentRefs:
    - name: labs64io-gateway
      namespace: tools
  hostnames:
    - mock-oidc.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: mock-oidc
          port: 8080
