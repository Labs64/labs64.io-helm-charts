# customer-portal is a UI-only (nginx) frontend chart: all deployment knobs live
# under `ui.*` (not top-level like the backend module charts). Keep that nesting
# or the values fail this chart's values.schema.json.
global:
  domain: example.com

ui:
  gateway:
    enabled: true

  networkPolicy:
    enabled: true

  podDisruptionBudget:
    enabled: true
