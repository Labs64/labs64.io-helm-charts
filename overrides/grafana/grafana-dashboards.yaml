apiVersion: v1
data:
  ecosystem.json: "{\n  \"title\": \"Labs64.IO Ecosystem Overview\",\n  \"uid\": \"\
    labs64io-overview\",\n  \"tags\": [\n    \"ecosystem\",\n    \"biz\",\n    \"\
    tech\"\n  ],\n  \"timezone\": \"browser\",\n  \"refresh\": \"10s\",\n  \"schemaVersion\"\
    : 38,\n  \"panels\": [\n    {\n      \"id\": 1,\n      \"title\": \"Traefik Ingress\
    \ Traffic (RPS)\",\n      \"type\": \"timeseries\",\n      \"datasource\": {\n\
    \        \"type\": \"prometheus\",\n        \"uid\": \"Prometheus\"\n      },\n\
    \      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 6,\n        \"x\": 0,\n\
    \        \"y\": 0\n      },\n      \"targets\": [\n        {\n          \"expr\"\
    : \"sum(rate(traefik_entrypoint_requests_total[1m])) by (entrypoint, code)\",\n\
    \          \"legendFormat\": \"{{entrypoint}} - {{code}}\",\n          \"refId\"\
    : \"A\"\n        }\n      ]\n    },\n    {\n      \"id\": 2,\n      \"title\"\
    : \"Backend HTTP Requests (RPS)\",\n      \"type\": \"timeseries\",\n      \"\
    datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\": \"Prometheus\"\
    \n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"w\": 6,\n     \
    \   \"x\": 6,\n        \"y\": 0\n      },\n      \"targets\": [\n        {\n \
    \         \"expr\": \"sum(rate(http_server_requests_seconds_count[1m])) by (application,\
    \ status)\",\n          \"legendFormat\": \"{{application}} ({{status}})\",\n\
    \          \"refId\": \"A\"\n        }\n      ]\n    },\n    {\n      \"id\":\
    \ 5,\n      \"title\": \"JVM Memory Usage (Heap)\",\n      \"type\": \"timeseries\"\
    ,\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\"\
    : \"Prometheus\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"\
    w\": 6,\n        \"x\": 12,\n        \"y\": 0\n      },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"sum(jvm_memory_used_bytes{area=\\\"heap\\\"\
    }) by (application, id)\",\n          \"legendFormat\": \"{{application}} - {{id}}\"\
    ,\n          \"refId\": \"A\"\n        }\n      ]\n    },\n    {\n      \"id\"\
    : 3,\n      \"title\": \"AuditFlow Biz Outcomes\",\n      \"type\": \"timeseries\"\
    ,\n      \"datasource\": {\n        \"type\": \"prometheus\",\n        \"uid\"\
    : \"Prometheus\"\n      },\n      \"gridPos\": {\n        \"h\": 8,\n        \"\
    w\": 6,\n        \"x\": 18,\n        \"y\": 0\n      },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"sum(rate(auditflow_pipeline_outcomes_total[1m]))\
    \ by (outcome)\",\n          \"legendFormat\": \"{{outcome}}\",\n          \"\
    refId\": \"A\"\n        }\n      ]\n    },\n    {\n      \"id\": 4,\n      \"\
    title\": \"Ecosystem Live Logs\",\n      \"type\": \"logs\",\n      \"datasource\"\
    : {\n        \"type\": \"victoriametrics-logs-datasource\",\n        \"uid\":\
    \ \"VictoriaLogs\"\n      },\n      \"gridPos\": {\n        \"h\": 12,\n     \
    \   \"w\": 24,\n        \"x\": 0,\n        \"y\": 8\n      },\n      \"targets\"\
    : [\n        {\n          \"expr\": \"*\",\n          \"refId\": \"A\"\n     \
    \   }\n      ]\n    }\n  ]\n}"
