apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-auth-security
  namespace: monitoring
data:
  auth-security.json: |
    {
      "uid": "labs64io-auth-security",
      "title": "05. AuthN/AuthZ/Security",
      "description": "Security metrics and access logs",
      "tags": [
        "security"
      ],
      "timezone": "browser",
      "editable": true,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Access KPIs",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 2,
          "title": "Auth Allow Rate",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 4,
            "h": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(labs64_authz_decisions_total{decision=\"allow\"}[5m])) / sum(rate(labs64_authz_decisions_total[5m])) or vector(1)",
              "legendFormat": "Allow Rate",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 12,
          "title": "Total Traffic (1h)",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 4,
            "y": 1,
            "w": 5,
            "h": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(traefik_service_requests_total[1h])) or vector(0)",
              "legendFormat": "Reqs (1h)",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "401 Unauthorized",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 9,
            "y": 1,
            "w": 5,
            "h": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{code=\"401\"}[5m])) or vector(0)",
              "legendFormat": "Req/s",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "title": "403 Forbidden",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 14,
            "y": 1,
            "w": 5,
            "h": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_service_requests_total{code=\"403\"}[5m])) or vector(0)",
              "legendFormat": "Req/s",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "title": "Auth Deny Count",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 19,
            "y": 1,
            "w": 5,
            "h": 6
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(increase(labs64_authz_decisions_total{decision=\"deny\"}[1h])) or vector(0)",
              "legendFormat": "Denials (1h)",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 6,
          "type": "row",
          "title": "Detailed Traffic",
          "gridPos": {
            "x": 0,
            "y": 7,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 7,
          "title": "Authz Decisions by Action",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 8,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(increase(labs64_authz_decisions_total[1h])) by (action, decision) or vector(0)",
              "legendFormat": "{{action}} - {{decision}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 8,
          "title": "Gateway Traffic by Status Code (1h)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 8,
            "y": 8,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(increase(traefik_service_requests_total[1h])) by (code) or vector(0)",
              "legendFormat": "HTTP {{code}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 11,
          "title": "Top Attack Targets (1h)",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 16,
            "y": 8,
            "w": 8,
            "h": 8
          },
          "targets": [
            {
              "expr": "topk(10, sum(increase(traefik_service_requests_total{code=~\"401|403\"}[1h])) by (service, code))",
              "legendFormat": "{{service}} {{code}}",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": []
        },
        {
          "id": 9,
          "type": "row",
          "title": "Security Logs",
          "gridPos": {
            "x": 0,
            "y": 16,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 10,
          "title": "Auth/Security Warnings & Errors",
          "type": "logs",
          "datasource": {
            "type": "loki",
            "uid": "Loki"
          },
          "gridPos": {
            "x": 0,
            "y": 17,
            "w": 24,
            "h": 10
          },
          "targets": [
            {
              "expr": "{namespace=~\"$namespace\"} |= \"auth\" |~ \"WARN|ERROR|401|403\"",
              "refId": "A"
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": false,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending"
          }
        }
      ],
      "schemaVersion": 39
    }
