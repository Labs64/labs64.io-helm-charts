apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-hardware
  namespace: monitoring
data:
  hardware-node-exporter.json: |
    {
      "uid": "labs64io-hardware",
      "title": "03. Node Exporter (Hardware)",
      "description": "Deep hardware and OS level metrics",
      "tags": [
        "hardware",
        "node"
      ],
      "timezone": "browser",
      "editable": true,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          },
          {
            "name": "instance",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "query": "label_values(node_uname_info, instance)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "CPU & System",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 2,
          "title": "CPU Usage by Mode",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "percentunit",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "avg(rate(node_cpu_seconds_total{instance=~\"$instance\"}[5m])) by (mode)",
              "legendFormat": "{{mode}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 3,
          "title": "Context Switches & Interrupts",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 8,
            "y": 1,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(node_context_switches_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Context Switches"
            },
            {
              "expr": "rate(node_intr_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Interrupts"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 4,
          "title": "System Load (1m, 5m, 15m)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 16,
            "y": 1,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "none",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "node_load1{instance=~\"$instance\"}",
              "legendFormat": "Load 1m"
            },
            {
              "expr": "node_load5{instance=~\"$instance\"}",
              "legendFormat": "Load 5m"
            },
            {
              "expr": "node_load15{instance=~\"$instance\"}",
              "legendFormat": "Load 15m"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 5,
          "type": "row",
          "title": "Memory & Storage",
          "gridPos": {
            "x": 0,
            "y": 9,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 6,
          "title": "Memory Breakdown",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 10,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "bytes",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "node_memory_MemTotal_bytes{instance=~\"$instance\"} - node_memory_MemAvailable_bytes{instance=~\"$instance\"}",
              "legendFormat": "Used"
            },
            {
              "expr": "node_memory_Buffers_bytes{instance=~\"$instance\"}",
              "legendFormat": "Buffers"
            },
            {
              "expr": "node_memory_Cached_bytes{instance=~\"$instance\"}",
              "legendFormat": "Cached"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 7,
          "title": "Disk IOPS (Read/Write)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 8,
            "y": 10,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "iops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(node_disk_reads_completed_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Reads {{device}}"
            },
            {
              "expr": "rate(node_disk_writes_completed_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Writes {{device}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 8,
          "title": "Disk Throughput",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 16,
            "y": 10,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "Bps",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "rate(node_disk_read_bytes_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Read {{device}}"
            },
            {
              "expr": "rate(node_disk_written_bytes_total{instance=~\"$instance\"}[5m])",
              "legendFormat": "Write {{device}}"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        }
      ],
      "schemaVersion": 39
    }
