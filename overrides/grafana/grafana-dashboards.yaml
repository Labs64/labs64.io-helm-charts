apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-cluster
  namespace: monitoring
data:
  cluster-monitoring.json: |
    {
      "uid": "labs64io-cluster",
      "title": "02. Cluster Monitoring",
      "description": "Kubernetes cluster metrics",
      "tags": [
        "kubernetes"
      ],
      "timezone": "browser",
      "editable": true,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Nodes Overview",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 2,
          "title": "Nodes Ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"Ready\", status=\"true\"})",
              "legendFormat": "Ready Nodes",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "Mem Pressure",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 4,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"MemoryPressure\", status=\"true\"})",
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "title": "Disk Pressure",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 8,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"DiskPressure\", status=\"true\"})",
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 5,
          "title": "PID Pressure",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 12,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(kube_node_status_condition{condition=\"PIDPressure\", status=\"true\"})",
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
