apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-ecosystem
  namespace: monitoring
data:
  ecosystem-overview.json: |
    {
      "uid": "labs64io-ecosystem",
      "title": "Labs64.IO Ecosystem Overview",
      "description": "Business monitoring dashboard for the Labs64.IO digital commerce ecosystem",
      "tags": ["ecosystem", "business", "overview"],
      "timezone": "browser",
      "editable": true,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate by Status",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "showPoints": "auto" },
              "unit": "reqps"
            },
            "overrides": [
              { "matcher": { "id": "byRegexp", "options": "2.." }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "3.." }, "properties": [{ "id": "color", "value": { "fixedColor": "blue", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "4.." }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "5.." }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_entrypoint_requests_total[5m])) by (code)",
              "legendFormat": "{{code}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Response Latency (p95)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "s"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(traefik_entrypoint_request_duration_seconds_bucket[5m])) by (le, entrypoint))",
              "legendFormat": "p95 {{entrypoint}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(traefik_entrypoint_request_duration_seconds_bucket[5m])) by (le, entrypoint))",
              "legendFormat": "p50 {{entrypoint}}",
              "refId": "B"
            }
          ]
        },
        {
          "id": 3,
          "title": "Backend HTTP Requests by Service",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=~\"$namespace\"}[5m])) by (application, status)",
              "legendFormat": "{{application}} ({{status}})",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "JVM Memory Usage (Heap)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "bytes"
            }
          },
          "targets": [
            {
              "expr": "sum(jvm_memory_used_bytes{area=\"heap\"}) by (application, id)",
              "legendFormat": "{{application}} - {{id}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "JVM Garbage Collection",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "s"
            }
          },
          "targets": [
            {
              "expr": "rate(jvm_gc_pause_seconds_sum[5m])",
              "legendFormat": "{{application}} - {{gc}} pause",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "AuditFlow Event Processing",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "ops"
            }
          },
          "targets": [
            {
              "expr": "sum(rate(auditflow_consumer_events_processed[5m])) by (application)",
              "legendFormat": "{{application}} processed",
              "refId": "A"
            },
            {
              "expr": "sum(rate(auditflow_consumer_events_failed[5m])) by (application)",
              "legendFormat": "{{application}} failed",
              "refId": "B"
            },
            {
              "expr": "sum(rate(auditflow_events_quarantined_total[5m]))",
              "legendFormat": "quarantined",
              "refId": "C"
            }
          ]
        },
        {
          "id": 7,
          "title": "Active Connections",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 24 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "sum(traefik_open_connections)",
              "legendFormat": "Traefik",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "HTTP Server Active Requests",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 24 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "sum(http_server_active_requests)",
              "legendFormat": "Backend",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "SLO Availability",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.99 },
                  { "color": "green", "value": 0.999 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "slo:availability:ratio_rate5m",
              "legendFormat": "{{application}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "title": "SLO Latency",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 24 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.95 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "slo:latency:ratio_rate5m",
              "legendFormat": "{{application}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 11,
          "title": "Ecosystem Logs",
          "type": "logs",
          "datasource": { "type": "loki", "uid": "Loki" },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 28 },
          "targets": [
            {
              "expr": "*",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39
    }
    
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-cluster
  namespace: monitoring
data:
  cluster-monitoring.json: |
    {
      "uid": "labs64io-cluster",
      "title": "Labs64.IO Cluster Monitoring",
      "description": "Kubernetes cluster health metrics — node status, pod health, resource requests, deployments, and networking",
      "tags": ["kubernetes", "cluster", "infrastructure"],
      "timezone": "browser",
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": { "type": "prometheus", "uid": "Prometheus" },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Node Ready",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "color": "green", "text": "READY" }, "0": { "color": "red", "text": "NOT READY" } } }
              ]
            }
          },
          "targets": [
            {
              "expr": "count(kube_node_info)",
              "legendFormat": "Nodes",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Pods Running",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "Deployments Ready",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "count(kube_deployment_status_replicas_available == kube_deployment_spec_replicas)",
              "legendFormat": "Ready",
              "refId": "A"
            },
            {
              "expr": "count(kube_deployment_spec_replicas)",
              "legendFormat": "Total",
              "refId": "B"
            }
          ]
        },
        {
          "id": 4,
          "title": "Namespaces",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "count(kube_namespace_status_phase{phase=\"Active\"})",
              "legendFormat": "Active",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "title": "Services",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "count(kube_service_info)",
              "legendFormat": "Services",
              "refId": "A"
            }
          ]
        },
        {
          "id": 6,
          "title": "ConfigMaps",
          "type": "stat",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "none" }
          },
          "targets": [
            {
              "expr": "count(kube_configmap_info)",
              "legendFormat": "ConfigMaps",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "title": "Pod Phase Distribution",
          "type": "piechart",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "count by (phase) (kube_pod_status_phase{namespace=~\"$namespace\"})",
              "legendFormat": "{{phase}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "title": "Pod Restarts (Top 10)",
          "type": "bargauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 4 },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "topk(10, sum by (pod, namespace) (kube_pod_container_status_restarts_total{namespace=~\"$namespace\"}))",
              "legendFormat": "{{namespace}}/{{pod}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 9,
          "title": "Deployment Replicas",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 4 },
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas",
              "legendFormat": "{{namespace}}/{{deployment}}",
              "refId": "A",
              "format": "table",
              "instant": true
            },
            {
              "expr": "kube_deployment_status_replicas_available",
              "legendFormat": "{{namespace}}/{{deployment}}",
              "refId": "B",
              "format": "table",
              "instant": true
            },
            {
              "expr": "kube_deployment_status_replicas_unavailable",
              "legendFormat": "{{namespace}}/{{deployment}}",
              "refId": "C",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "merge", "options": {} },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true }, "renameByName": { "namespace": "Namespace", "deployment": "Deployment", "Value #A": "Desired", "Value #B": "Available", "Value #C": "Unavailable" } } }
          ]
        },
        {
          "id": 10,
          "title": "Pod Status by Namespace",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "count by (namespace, phase) (kube_pod_status_phase{namespace=~\"$namespace\"})",
              "legendFormat": "{{namespace}} {{phase}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true }, "renameByName": { "namespace": "Namespace", "phase": "Phase", "Value": "Count" } } }
          ]
        },
        {
          "id": 11,
          "title": "Node Conditions",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "kube_node_status_condition{condition=~\"Ready|MemoryPressure|DiskPressure|PIDPressure|NetworkUnavailable\"}",
              "legendFormat": "{{node}} {{condition}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true, "endpoint": true, "namespace": true, "service": true }, "renameByName": { "node": "Node", "condition": "Condition", "status": "Status" } } }
          ]
        },
        {
          "id": 12,
          "title": "PersistentVolume Claims",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 20 },
          "targets": [
            {
              "expr": "kube_persistentvolumeclaim_info",
              "legendFormat": "{{namespace}}/{{persistentvolumeclaim}}",
              "refId": "A",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true, "endpoint": true, "service": true }, "renameByName": { "namespace": "Namespace", "persistentvolumeclaim": "PVC", "storageclass_name": "StorageClass", "status": "Status" } } }
          ]
        },
        {
          "id": 13,
          "title": "DaemonSet Status",
          "type": "table",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 20 },
          "targets": [
            {
              "expr": "kube_daemonset_status_desired_number_scheduled",
              "legendFormat": "{{namespace}}/{{daemonset}}",
              "refId": "A",
              "format": "table",
              "instant": true
            },
            {
              "expr": "kube_daemonset_status_number_ready",
              "legendFormat": "{{namespace}}/{{daemonset}}",
              "refId": "B",
              "format": "table",
              "instant": true
            }
          ],
          "transformations": [
            { "id": "merge", "options": {} },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "__name__": true, "instance": true, "job": true }, "renameByName": { "namespace": "Namespace", "daemonset": "DaemonSet", "Value #A": "Desired", "Value #B": "Ready" } } }
          ]
        }
      ],
      "schemaVersion": 39
    }
    
---
apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-auth-security
  namespace: monitoring
data:
  auth-security.json: |
    {
      "uid": "labs64io-auth-security",
      "title": "Labs64.IO AuthN/AuthZ/Security",
      "description": "Authentication, authorization, and security monitoring for the Labs64.IO ecosystem",
      "tags": ["security", "authentication", "authorization", "auth"],
      "timezone": "browser",
      "editable": true,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Authentication Success Rate",
          "type": "gauge",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 0.99 }
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(authenticated_user_requests[5m])) / sum(rate(http_server_requests_seconds_count[5m])) or vector(0)",
              "legendFormat": "Success Rate",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "title": "Auth Requests by Status",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 12, "x": 6, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "reqps"
            },
            "overrides": [
              { "matcher": { "id": "byRegexp", "options": "2.." }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "3.." }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "4.." }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byRegexp", "options": "5.." }, "properties": [{ "id": "color", "value": { "fixedColor": "dark-red", "mode": "fixed" } }] }
            ]
          },
          "targets": [
            {
              "expr": "sum(rate(traefik_entrypoint_requests_total[5m])) by (code)",
              "legendFormat": "HTTP {{code}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "title": "ForwardAuth Decision Latency",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 0 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 },
              "unit": "s"
            }
          },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\".*authproxy.*\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(traefik_service_request_duration_seconds_bucket{service=~\".*authproxy.*\"}[5m])) by (le))",
              "legendFormat": "p50",
              "refId": "B"
            }
          ]
        },
        {
          "id": 4,
          "title": "401 Unauthorized Rate (Potential Attacks)",
          "type": "timeseries",
          "datasource": { "type": "prometheus", "uid": "Prometheus" },
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 6 },
          "fieldConfig": {
            "defaults": {
              "custom": { "drawStyle": "bars", "lineWidth": 1, "fillOpacity": 50 },
              "unit": "reqps",
