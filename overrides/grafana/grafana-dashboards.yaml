apiVersion: v1
kind: ConfigMap
metadata:
  labels:
    grafana_dashboard: '1'
  name: grafana-dashboard-auditflow
  namespace: monitoring
data:
  auditflow-detailed.json: |
    {
      "uid": "labs64io-auditflow",
      "title": "07. AuditFlow Details",
      "description": "Deep dive into data pipeline",
      "tags": [
        "auditflow"
      ],
      "timezone": "browser",
      "editable": true,
      "refresh": "10s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "Prometheus"
            },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Pipeline Traffic",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
        {
          "id": 2,
          "title": "Consumer Events Processed",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(auditflow_consumer_events_processed[5m]))",
              "legendFormat": "Processed"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 3,
          "title": "Consumer Failures & Quarantine",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 8,
            "y": 1,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "ops",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "sum(rate(auditflow_consumer_events_failed[5m]))",
              "legendFormat": "Failed"
            },
            {
              "expr": "sum(rate(auditflow_events_quarantined_total[5m]))",
              "legendFormat": "Quarantined"
            }
          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 10,
          "title": "Inflight Events",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 16,
            "y": 1,
            "w": 8,
            "h": 8
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none",
              "color": {
                "mode": "value"
              }
            }
          },
          "targets": [
            {
              "expr": "sum(auditflow_consumer_events_inflight)",
              "legendFormat": "Inflight",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "values": false,
              "calcs": [
                "lastNotNull"
              ]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 4,
          "type": "row",
          "title": "Pipeline Latency & Outcomes",
          "gridPos": {
            "x": 0,
            "y": 9,
            "w": 24,
            "h": 1
          },
          "collapsed": false,
          "panels": []
        },
