          ],
          "options": {
            "tooltip": {
              "mode": "multi",
              "sort": "none"
            },
            "legend": {
              "displayMode": "list",
              "placement": "bottom",
              "calcs": []
            }
          }
        },
        {
          "id": 11,
          "title": "Pipeline Outcomes",
          "type": "table",
          "datasource": {
            "type": "prometheus",
            "uid": "Prometheus"
          },
          "gridPos": {
            "x": 16,
            "y": 10,
            "w": 8,
            "h": 8
          },
          "targets": [
            {
              "expr": "sum(increase(auditflow_pipeline_outcomes_total[1h])) by (pipeline, outcome)",
              "legendFormat": "{{pipeline}} - {{outcome}}",
              "instant": true,
              "format": "table"
