                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "opacity",
                "showPoints": "never"
              },
              "unit": "s",
              "color": {
                "mode": "palette-classic"
              }
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "max(auditflow_pipeline_duration_seconds_max)",
              "legendFormat": "Max Duration"
