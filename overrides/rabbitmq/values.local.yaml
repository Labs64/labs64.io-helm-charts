# Since 2025-08-28, Bitnami only publishes rolling `latest`/digest tags under
# `docker.io/bitnami/*` for free; the `bitnamilegacy/*` namespace still serves the
# exact versioned images (e.g. this chart's pinned `4.1.3-debian-12-r1`) that the
# free-tier `bitnami/*` repo no longer has at all. Same fix already applied to
# the `preflight` chart's default postgresql/redis check images.
global:
  security:
    allowInsecureImages: true
image:
  registry: docker.io
  repository: bitnamilegacy/rabbitmq
  tag: 4.1.3-debian-12-r1
