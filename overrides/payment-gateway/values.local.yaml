image:
  repository: localhost:5005/payment-gateway
  tag: latest
  pullPolicy: Always

gateway:
  enabled: true

networkPolicy:
  enabled: true

rabbitmq:
  enabled: false

postgresql:
  enabled: false

redis:
  enabled: false

# Authorization PEP -> central Cerbos PDP (RFC-07)
env:
  - name: LABS64_AUTH_AUTHZ_MODE
    value: SHADOW
  - name: LABS64_AUTH_AUTHZ_PDPADDRESS
    value: cerbos.labs64io.svc.cluster.local:3593
