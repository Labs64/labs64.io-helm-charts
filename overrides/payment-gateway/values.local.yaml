image:
  repository: localhost:5005/payment-gateway
  tag: latest
  pullPolicy: Always

gateway:
  enabled: true

networkPolicy:
  enabled: true

rabbitmq:
  enabled: false

postgresql:
  enabled: false

redis:
  enabled: false

# Cedar domain authorization (RFC-05 P4): the pilot module runs ENFORCE
# locally — flipped after the shadow diff came back clean (unit + e2e).
# Binding: LABS64_CEDAR_MODE -> labs64.auth.cedar.mode (application.yml).
env:
  - name: LABS64_CEDAR_MODE
    value: ENFORCE
