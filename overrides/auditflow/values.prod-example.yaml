# PRODUCTION EXAMPLE (BYO infrastructure) - copy and adapt; do not use as-is.
# Bundled deps stay off; point applicationYaml at your infrastructure and
# deliver credentials via secrets.data (preferably sourced through
# External Secrets Operator or your secret-management tooling).
global:
  domain: example.com

gateway:
  enabled: true

networkPolicy:
  enabled: true

podDisruptionBudget:
  enabled: true

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5

applicationYaml:
  spring:
    rabbitmq:
      host: rabbitmq.infra.example.com
      port: 5672

secrets:
  data:
    SPRING_RABBITMQ_USERNAME: <your-broker-username>
    SPRING_RABBITMQ_PASSWORD: <your-broker-password>

# RECOMMENDED for production: replace the inline secrets.data above with an
# ExternalSecret sourced from your real secret backend (AWS Secrets Manager, Vault,
# etc.) via a ClusterSecretStore you define — do not reuse the local dev
# "local-kubernetes-store" (kubernetes-provider) outside of local/CI.
# externalSecrets:
#   enabled: true
#   storeName: <your-clustersecretstore-name>
#   secretKey: <key/path in your backend containing this app's secret map>
