# Traefik dashboard via Gateway API (replaces the chart's IngressRoute to
# api@internal, which Gateway API cannot express). Host-scoped to
# dashboard.localhost — the old PathPrefix(`/dashboard`) || PathPrefix(`/api`)
# rule matched EVERY host, shadowing gateway.localhost/api.
# Requires api.insecure + ports.traefik.expose.default (values.local.yaml). DEV ONLY.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: traefik-dashboard
  namespace: tools
spec:
  parentRefs:
    - name: labs64io-gateway
      namespace: tools
  hostnames:
    - dashboard.localhost
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: traefik
          port: 8080
