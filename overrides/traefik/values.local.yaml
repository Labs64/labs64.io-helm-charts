# Dashboard is served via a Gateway API HTTPRoute (dashboard-httproute.yaml) on
# dashboard.localhost instead of the chart's IngressRoute. api.insecure serves the
# dashboard/API on the internal `traefik` entrypoint (:8080), which the route
# targets through the Service. DEV ONLY — never enable api.insecure in production.
api:
  insecure: true
ports:
  traefik:
    expose:
      default: true
ingressRoute:
  dashboard:
    enabled: false

# Gateway API is now the routing substrate: modules own HTTPRoutes that attach to
# the platform Gateway below. ForwardAuth/rate-limit/compress remain Traefik
# Middlewares referenced from the HTTPRoutes via ExtensionRef.
providers:
  kubernetesGateway:
    enabled: true

# Chart-provisioned GatewayClass (referenced by the Gateway below).
gatewayClass:
  enabled: true

# Chart-provisioned platform Gateway. Modules in the labs64io namespace attach
# their HTTPRoutes here via parentRefs {name: labs64io-gateway, namespace: tools},
# so the listener must allow routes from all namespaces.
gateway:
  enabled: true
  name: labs64io-gateway
  namespace: tools
  listeners:
    web:
      port: 8000
      protocol: HTTP
      namespacePolicy:
        from: All

