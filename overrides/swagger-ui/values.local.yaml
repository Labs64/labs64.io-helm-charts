global:
  domain: localhost

networkPolicy:
  enabled: true

ingressroute:

  # -- Define IngressRoute(s) for swagger-ui (module routes are owned by the module charts)
  routes:
    # -- Swagger UI served under /swagger-ui (public — no auth required)
    - path: /swagger-ui
      service:
        name: labs64io-swagger-ui
        port: 8080
      middlewares:
        - name: strip-prefix
    # -- Root path convenience redirect to the Swagger UI (Traefik prefers longer matches, so module routes always win over this catch-all)
    - path: /
      service:
        name: labs64io-swagger-ui
        port: 8080
      middlewares:
        - name: root-redirect

  # -- Middlewares owned by the swagger-ui chart itself
  middlewares:
    # -- Strip Prefix Middleware (swagger-ui only)
    - name: strip-prefix
      spec:
        stripPrefix:
          prefixes:
            - /swagger-ui
    # -- Redirect the bare root URL to the Swagger UI
    - name: root-redirect
      spec:
        redirectRegex:
          regex: "^(https?://[^/]+)/$"
          replacement: "${1}/swagger-ui/"

# -- Swagger UI Configuration (urls templated via global.domain)
swaggerUI:
  urls:
    - url: http://gateway.{{ .Values.global.domain }}/auditflow/v3/api-docs
      name: AuditFlow API
    - url: http://gateway.{{ .Values.global.domain }}/checkout/v3/api-docs
      name: Checkout API
    - url: http://gateway.{{ .Values.global.domain }}/payment-gateway/v3/api-docs
      name: Payment Gateway API
