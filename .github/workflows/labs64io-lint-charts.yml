name: Labs64.IO - Lint Charts

on:
  pull_request:
    paths:
      - 'charts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history needed to diff each chart against the PR base ref below.
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: '3.17.0'

      - name: Install helm-schema plugin
        run: helm plugin install https://github.com/dadav/helm-schema

      - name: Enforce chart version bump
        # chart-releaser skips re-publishing a chart whose Chart.yaml version already has a
        # release tag (skip_existing: true) — silently, with no error. A chart whose files
        # changed but whose version didn't move (or moved backwards) would simply never reach
        # the public repo. Every chart with a diff against the PR base must bump `version:`.
        run: |
          set -euo pipefail
          BASE="origin/${{ github.event.pull_request.base.ref || 'master' }}"
          git fetch origin "${{ github.event.pull_request.base.ref || 'master' }}" --depth=1 2>/dev/null || true
          FAILED=0
          for chart_dir in charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            chart_name=$(basename "$chart_dir")

            if git diff --quiet "$BASE" -- "$chart_dir" 2>/dev/null; then
              continue
            fi

            old_version=$(git show "$BASE:$chart_dir/Chart.yaml" 2>/dev/null | sed -n -E 's/^version: *//p' || echo "")
            new_version=$(sed -n -E 's/^version: *//p' "$chart_dir/Chart.yaml")

            if [ -z "$old_version" ]; then
              echo "NEW CHART: $chart_name ($new_version) — no version check needed"
              continue
            fi

            if [ "$old_version" = "$new_version" ]; then
              echo "FAIL: $chart_name changed but version was not bumped (still $new_version)"
              FAILED=1
              continue
            fi

            newer=$(printf '%s\n%s\n' "$old_version" "$new_version" | sort -V | tail -1)
            if [ "$newer" != "$new_version" ] || [ "$old_version" = "$new_version" ]; then
              echo "FAIL: $chart_name version $old_version -> $new_version is not an increase"
              FAILED=1
              continue
            fi

            echo "PASS: $chart_name $old_version -> $new_version"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "One or more changed charts did not get a version bump. Bump Chart.yaml's"
            echo "'version:' (and, for library-chart consumers, the pinned chart-libs"
            echo "dependency version) or the release pipeline will silently skip publishing it."
            exit 1
          fi

      - name: Build chart dependencies
        # Vendored deps (charts/*/charts/) are gitignored, so a fresh checkout is
        # missing them (e.g. chart-libs, a file://../chart-libs local dependency);
        # without this, every dependent chart fails to lint/template below.
        run: |
          set -euo pipefail
          for chart_dir in charts/*/; do
            [ -f "$chart_dir/Chart.yaml" ] || continue
            helm dependency build "$chart_dir"
          done

      - name: Enforce schema generation
        run: |
          helm schema --chart-search-root ./charts --no-dependencies --append-newline
          if ! git diff --exit-code; then
            echo "ERROR: values.schema.json files are out of date. Please run 'just generate-schema' and commit the changes."
            exit 1
          fi

      - name: Enforce docs generation
        run: |
          docker run --rm -v "$(pwd):/helm-docs" -u "$(id -u):$(id -g)" jnorwood/helm-docs:v1.14.2 --chart-search-root ./charts --log-level warning
          if ! git diff --exit-code; then
            echo "ERROR: README.md files are out of date. Please run 'just generate-docu' and commit the changes."
            exit 1
          fi

      - name: Lint and validate charts
        run: |
          set -euo pipefail
          FAILED=0
          for chart_dir in charts/*/; do
            chart_name=$(basename "$chart_dir")
            # Skip non-chart directories
            if [ ! -f "$chart_dir/Chart.yaml" ]; then
              continue
            fi
            echo "=== Linting: $chart_name ==="

            # helm lint
            if ! helm lint "$chart_dir"; then
              echo "FAIL: helm lint $chart_name"
              FAILED=1
            fi

            # helm template (syntax + render check)
            if ! helm template "test-$chart_name" "$chart_dir" > /dev/null 2>&1; then
              echo "FAIL: helm template $chart_name"
              helm template "test-$chart_name" "$chart_dir" 2>&1 | tail -5
              FAILED=1
            fi

            # Schema validation (schema must exist)
            if [ ! -f "$chart_dir/values.schema.json" ]; then
              echo "FAIL: Missing values.schema.json in $chart_name"
              FAILED=1
            else
              if ! helm template "test-$chart_name" "$chart_dir" -f "$chart_dir/values.yaml" > /dev/null 2>&1; then
                echo "FAIL: schema validation $chart_name"
                helm template "test-$chart_name" "$chart_dir" -f "$chart_dir/values.yaml" 2>&1 | tail -5
                FAILED=1
              fi
            fi

            echo "PASS: $chart_name"
          done

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "Some charts failed linting. See errors above."
            exit 1
          fi

          echo ""
          echo "All charts passed."
